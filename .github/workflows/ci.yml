name: Simple Self Hosted Runner Test

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  simple-test:
    runs-on: [self-hosted, rabie]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          echo "This job is running on my cloud runner"
          echo "Hostname:"
          hostname
          echo "User:"
          whoami
          echo "Current path:"
          pwd
          echo "Date:"
          date

      - name: Create a file on the runner
        run: |
          echo "Hello from GitHub Actions self-hosted runner" > runner-proof.txt
          echo "Runner name: rabie" >> runner-proof.txt
          echo "Created at: $(date)" >> runner-proof.txt

      - name: Show created file
        run: |
          cat runner-proof.txt

      - name: List workspace files
        run: |
          ls -la