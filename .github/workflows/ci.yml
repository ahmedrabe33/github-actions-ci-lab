name: Python CI Pipeline on Cloud Runner

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, rabie]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check runner machine
        run: |
          echo "Running on self-hosted runner"
          hostname
          whoami
          pwd
          python3 --version

      - name: Create virtual environment
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest